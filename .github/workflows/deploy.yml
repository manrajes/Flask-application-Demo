name: Deploy Flask and Postgres to AKS

on:
  push:
    branches:
      - main  # Triggers the simulation whenever you push to main branch

env:
  CLUSTER_NAME: "Test"       # Change to your AKS cluster name
  RESOURCE_GROUP: "RG-Lab-Test-USEAST"  # Change to your Azure Resource Group
  APP_NAME: "flask-app"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    
    # 1. Check out the code from GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Log in to the Azure Platform securely
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 3. Log in to Azure Container Registry (ACR)
    - name: Docker Registry Login
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.ACR_NAME }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 4. Build the Flask Image and push it to your private registry
    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.ACR_NAME }}/${{ env.APP_NAME }}:${{ github.sha }} .
        docker push ${{ secrets.ACR_NAME }}/${{ env.APP_NAME }}:${{ github.sha }}

    # 5. Set up kubectl context pointing to your AKS Cluster
    - name: Set AKS Context
      uses: azure/aks-set-context@v4
      with:
        resource-group: ${{ env.RESOURCE_GROUP }}
        cluster-name: ${{ env.CLUSTER_NAME }}

    # 6. Set up Helm CLI on the GitHub Action runner
    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: 'v3.14.0'

    # 7. Deploy Postgres DB using the stable MCR Mirror configuration
    - name: Deploy PostgreSQL via Helm
      run: |
        helm upgrade --install my-postgres oci://registry-1.docker.io/bitnamicharts/postgresql \
          --set global.imageRegistry=://microsoft.com \
          --set auth.postgresPassword="SuperSecurePassword123" \
          --set primary.persistence.size=1Gi

    # 8. Deploy the Flask application via standard Kubernetes Manifests
    - name: Deploy Flask App to AKS
      run: |
        # Create a dynamic manifest parsing the unique commit SHA image tag
        cat <<EOF | kubectl apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: flask-app
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: flask-app
          template:
            metadata:
              labels:
                app: flask-app
            spec:
              containers:
              - name: flask-app
                image: ${{ secrets.ACR_NAME }}/${{ env.APP_NAME }}:${{ github.sha }}
                ports:
                - containerPort: 5000
                env:
                - name: DATABASE_HOST
                  value: "my-postgres-postgresql"
                - name: DATABASE_NAME
                  value: "postgres"
                - name: DATABASE_USER
                  value: "postgres"
                - name: DATABASE_PASSWORD
                  value: "SuperSecurePassword123"
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: flask-app-service
        spec:
          type: LoadBalancer
          ports:
          - port: 80
            targetPort: 5000
          selector:
            app: flask-app
        EOF
